id: search-discovery
version: 1.0.1
name: Search Discovery
author: agirunner
slug: search-discovery
category: research
stability: beta
description: Discover and rank relevant external sources, entities, or signals for a scoped brief.
outcome: A discovery packet exists with ranked findings, supporting evidence, gaps, and a recommended next step.
lifecycle: planned
tags:
  - research
  - discovery
  - search
specialist_ids:
  - discovery-analyst
definition:
  outcome: A discovery packet exists with ranked findings, supporting evidence, gaps, and a recommended next step.
  process_instructions: |
    Run the workflow through the authored stages `brief-framing`, `source-discovery`, and `packet`. Treat each stage as a distinct checkpoint of discovery quality: `brief-framing` exists to define the discovery target, inclusion rules, and decision context; `source-discovery` exists to gather and compare the strongest available evidence; `packet` exists to turn that evidence into a ranked or grouped discovery packet that another operator can act on.

    Use these roles deliberately: `Discovery Analyst` owns the discovery brief, evidence gathering, ranking logic, and final packet.

    Preferred flow: start with the earliest unfinished stage, require the discovery brief and search scope to be explicit before ranking findings, and prefer direct or sourceable evidence over weak aggregation. When the quoted `native web search` tool is available to the current task, use it for open-web discovery before falling back to narrower source paths. Remove weak candidates instead of padding the packet, and use one consistent ranking frame across the final result.

    Recovery and exception handling: if the brief is too broad to search honestly, if the discovery criteria drift midstream, if the evidence is too thin to support a long ranked list, or if the available search tooling does not surface the needed sources, keep the current stage open until the scope is narrowed and the limitation is explicit. Do not convert weak search output into fake certainty. If the strongest honest answer is a short list, a grouped map, or a request for sharper scope, record that directly.

    Completion rules: finish only after the final packet records the discovery brief, search scope, ranked or grouped findings, supporting evidence, material gaps or uncertainty, and the recommended next step. Stage-specific closure for this playbook: `brief-framing` stays open until the scope and inclusion rules are explicit; `source-discovery` stays open until the available evidence has been compared and bounded; `packet` stays open until the final output is internally consistent and honest about search limits. Guided closure rule: prefer a smaller but evidence-backed packet over a larger packet built from weak inclusion logic.
  parameters:
    - slug: discovery_brief
      title: Discovery Brief
      required: true
    - slug: target_scope
      title: Target Scope
      required: false
    - slug: search_constraints
      title: Search Constraints
      required: false
  roles:
    - Discovery Analyst
  stages:
    - name: brief-framing
      goal: The discovery brief, scope, and inclusion rules are explicit.
      involves:
        - Discovery Analyst
    - name: source-discovery
      goal: Relevant evidence has been gathered and compared.
      involves:
        - Discovery Analyst
    - name: packet
      goal: A ranked or grouped discovery packet is documented.
      involves:
        - Discovery Analyst
  lifecycle: planned
  orchestrator:
    max_rework_iterations: 3
    max_active_tasks: 2
    max_active_tasks_per_work_item: 1
    allow_parallel_work_items: false
