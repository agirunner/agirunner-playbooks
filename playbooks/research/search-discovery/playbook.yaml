id: search-discovery
version: 1.0.5
name: Search Discovery
author: agirunner
slug: search-discovery
category: research
stability: experimental
description: Discover and rank relevant external sources, entities, or signals for a scoped brief.
outcome: A discovery packet exists with ranked findings, supporting evidence, gaps, and a recommended next step.
lifecycle: planned
tags:
  - research
  - discovery
  - search
specialist_ids:
  - discovery-analyst
definition:
  outcome: A discovery packet exists with ranked findings, supporting evidence, gaps, and a recommended next step.
  process_instructions: |
    Run the workflow through the authored stages `brief-framing`, `source-discovery`, and `packet`. Treat each stage as a distinct checkpoint of discovery quality: `brief-framing` exists to define the discovery target, inclusion rules, and decision context; `source-discovery` exists to gather and compare the strongest available evidence; `packet` exists to turn that evidence into a ranked or grouped discovery packet that another operator can act on.

    Use these roles deliberately: `Discovery Analyst` owns the discovery brief, evidence gathering, ranking logic, and final packet.

    Preferred flow: start with the earliest unfinished stage, require the discovery brief and search scope to be explicit before ranking findings, and prefer direct or sourceable evidence over weak aggregation. Treat explicit source-scope or research-path instructions from the brief and launch inputs as binding. When those instructions call for external research or quoted `native web search` and the current task and selected model expose `native_search`, the specialist must call `native_search` before relying only on local artifacts or model knowledge unless the task records a concrete reason that path is unavailable, disabled, or clearly irrelevant. Tool enumeration alone does not satisfy that rule; when this path is required and available, the specialist must actually use quoted `native web search` before handoff and reflect what it returned or why it could not be used. Use `tool_search` to confirm the current task's exposed tool list before describing tool availability. That current-task tool list is canonical: source-scope notes, framing artifacts, and predecessor handoffs must not mark quoted `native web search` as unavailable when `native_search` is present, and later stages must ignore stale contrary notes and follow the current task contract. When the current task and selected model expose the `native_search` tool for quoted `native web search`, the first open-web discovery step after checking the available tools must be `native_search` so the specialist discovers candidate sources before choosing what to inspect. Use `web_fetch` or other narrower source paths only after `native_search` surfaces promising sources, or after the specialist establishes that `native_search` is unavailable or insufficient. Do not begin open-web discovery with repeated `web_fetch` probing while `native_search` is available. Remove weak candidates instead of padding the packet, and use one consistent ranking frame across the final result.

    Recovery and exception handling: if the brief is too broad to search honestly, if the discovery criteria drift midstream, if the evidence is too thin to support a long ranked list, or if the available search tooling does not surface the needed sources, keep the current stage open until the scope is narrowed and the limitation is explicit. Do not convert weak search output into fake certainty. If the strongest honest answer is a short list, a grouped map, or a request for sharper scope, record that directly.

    Completion rules: finish only after the final packet records the discovery brief, search scope, ranked or grouped findings, supporting evidence, material gaps or uncertainty, and the recommended next step. Stage-specific closure for this playbook: `brief-framing` stays open until the scope and inclusion rules are explicit; `source-discovery` stays open until the available evidence has been compared and bounded; `packet` stays open until the final output is internally consistent and honest about search limits. Guided closure rule: prefer a smaller but evidence-backed packet over a larger packet built from weak inclusion logic.
  parameters:
    - slug: discovery_brief
      title: Discovery Brief
      required: true
    - slug: target_scope
      title: Target Scope
      required: false
    - slug: search_constraints
      title: Search Constraints
      required: false
  roles:
    - Discovery Analyst
  stages:
    - name: brief-framing
      goal: The discovery brief, scope, and inclusion rules are explicit.
      involves:
        - Discovery Analyst
    - name: source-discovery
      goal: Relevant evidence has been gathered and compared.
      involves:
        - Discovery Analyst
    - name: packet
      goal: A ranked or grouped discovery packet is documented.
      involves:
        - Discovery Analyst
  lifecycle: planned
  orchestrator:
    max_rework_iterations: 5
    max_active_tasks: 2
    max_active_tasks_per_work_item: 1
    allow_parallel_work_items: false
