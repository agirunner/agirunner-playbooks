id: market-map
version: 1.0.5
name: Market Map
author: agirunner
slug: market-map
category: research
stability: experimental
description: Map a market slice into relevant entities, segments, and evidence-backed comparisons.
outcome: A market map exists with grouped entities, comparison notes, gaps, and recommended next research steps.
lifecycle: planned
tags:
  - research
  - discovery
  - market
specialist_ids:
  - discovery-analyst
definition:
  outcome: A market map exists with grouped entities, comparison notes, gaps, and recommended next research steps.
  process_instructions: |
    Run the workflow through the authored stages `market-framing`, `entity-discovery`, and `mapping-synthesis`. Treat each stage as a distinct checkpoint of market understanding: `market-framing` exists to define the market slice and comparison frame; `entity-discovery` exists to find the relevant entities and supporting evidence; `mapping-synthesis` exists to group the entities into a usable market view with gaps and next steps.

    Use these roles deliberately: `Discovery Analyst` frames the market question, finds the relevant entities, and produces the final market map.

    Preferred flow: start with the earliest unfinished stage, require the market topic and comparison axes to be explicit before grouping entities, and prefer direct evidence that an entity belongs in the market slice over superficial mentions. Treat explicit source-scope or research-path instructions from the brief and launch inputs as binding. When those instructions call for external research or quoted `native web search` and the current task and selected model expose `native_search`, the specialist must call `native_search` before relying only on local artifacts or model knowledge unless the task records a concrete reason that path is unavailable, disabled, or clearly irrelevant. Tool enumeration alone does not satisfy that rule; when this path is required and available, the specialist must actually use quoted `native web search` before handoff and reflect what it returned or why it could not be used. Use `tool_search` to confirm the current task's exposed tool list before describing tool availability. That current-task tool list is canonical: source-scope notes, framing artifacts, and predecessor handoffs must not mark quoted `native web search` as unavailable when `native_search` is present, and later stages must ignore stale contrary notes and follow the current task contract. When the current task and selected model expose the `native_search` tool for quoted `native web search`, the first open-web discovery step after checking the available tools must be `native_search` so the specialist discovers candidate sources before choosing what to inspect. Use `web_fetch` or other narrower source paths only after `native_search` surfaces promising sources, or after the specialist establishes that `native_search` is unavailable or insufficient. Do not begin open-web discovery with repeated `web_fetch` probing while `native_search` is available. Keep entity inclusion logic consistent throughout the map.

    Recovery and exception handling: if the market definition is too broad, if entities are being grouped without evidence, if comparison axes change after discovery begins, or if the available search tooling does not surface a trustworthy market picture, keep the current stage open until the limitation is explicit. Do not turn a weak list into a fake market taxonomy. If the strongest honest answer is an initial map with major gaps, record those gaps directly.

    Completion rules: finish only after the final market map records the market topic, grouping frame, included entities, comparison notes, material gaps, and recommended next research steps. Stage-specific closure for this playbook: `market-framing` stays open until the market slice and comparison frame are explicit; `entity-discovery` stays open until candidate entities are gathered and bounded; `mapping-synthesis` stays open until the grouped market view is internally consistent and honest about uncertainty. Guided closure rule: prefer a smaller but defensible market map over a sprawling map built from weak inclusion evidence.
  parameters:
    - slug: market_topic
      title: Market Topic
      required: true
    - slug: comparison_axes
      title: Comparison Axes
      required: false
    - slug: search_constraints
      title: Search Constraints
      required: false
  roles:
    - Discovery Analyst
  stages:
    - name: market-framing
      goal: The market slice and comparison frame are explicit.
      involves:
        - Discovery Analyst
    - name: entity-discovery
      goal: Relevant entities are discovered and bounded.
      involves:
        - Discovery Analyst
    - name: mapping-synthesis
      goal: A market map with groups, gaps, and next steps is documented.
      involves:
        - Discovery Analyst
  lifecycle: planned
  orchestrator:
    max_rework_iterations: 5
    max_active_tasks: 2
    max_active_tasks_per_work_item: 1
    allow_parallel_work_items: false
