id: research-analysis
version: 1.0.8
name: Research Analysis
author: agirunner
slug: research-analysis
category: research
stability: experimental
description: Produce a grounded research synthesis with explicit evidence, contradictions, and confidence.
outcome: A research synthesis exists with evidence, contradictions, confidence, and a recommendation or next step.
lifecycle: planned
tags:
  - research
  - analysis
  - synthesis
specialist_ids:
  - research-analyst
definition:
  outcome: A research synthesis exists with evidence, contradictions, confidence, and a recommendation or next step.
  process_instructions: |
    Run the workflow through the authored stages `question-framing`, `source-review`, and `synthesis`. Treat each stage as a distinct checkpoint of research quality: `question-framing` exists to define the exact question and decision context; `source-review` exists to gather and compare evidence; `synthesis` exists to turn the evidence into findings, contradictions, confidence, and a recommendation or next step.

    Use these roles deliberately: `Research Analyst` defines the research question, examines the available sources, and produces the final synthesis.

    Preferred flow: start with the earliest unfinished stage, dispatch `Research Analyst`, and move forward only when the research question is explicit and the source base is strong enough to support a synthesis. Treat explicit source-scope or research-path instructions from the brief and launch inputs as binding. When those instructions call for external research or quoted `native web search` and the current task and selected model expose `native_search`, the specialist must call `native_search` before relying only on local artifacts or model knowledge unless the task records a concrete reason that path is unavailable, disabled, or clearly irrelevant. Tool enumeration alone does not satisfy that rule; when this path is required and available, the specialist must actually use quoted `native web search` before handoff and reflect what it returned or why it could not be used. Use `tool_search` to confirm the current task's exposed tool list before describing tool availability. That current-task tool list is canonical: source-scope notes, framing artifacts, and predecessor handoffs must not mark quoted `native web search` as unavailable when `native_search` is present, and later stages must ignore stale contrary notes and follow the current task contract. When the current task and selected model expose the `native_search` tool for quoted `native web search`, the first open-web research step after checking the available tools must be `native_search` so the specialist discovers candidate sources before choosing what to inspect. Use `web_fetch` or other narrower source-access paths only after `native_search` surfaces promising sources, or after the specialist establishes that `native_search` is unavailable or insufficient. Do not begin open-web discovery with repeated `web_fetch` probing while `native_search` is available. Prefer primary or direct sources when possible, weigh source quality explicitly when they are unavailable, track source recency where the topic can change quickly, and record what remains uncertain.

    Recovery and exception handling: if the source base is weak, contradictory, incomplete, or stale relative to the question, keep the current stage open until the handoff makes those limits explicit. Do not close the playbook on vague confidence language or selective sourcing. If the strongest honest answer is “more research needed,” record that as the next step instead of manufacturing a definitive conclusion. If the quoted `native web search` tool is not exposed by the current task or selected model, is disabled for the task, or does not surface the needed evidence, use the best available sources and record that limitation plainly. Lack of a writable workspace is not blocking for this playbook.

    Completion rules: finish only after the synthesis clearly states the question, sources consulted, source quality notes, findings, contradictions or gaps, confidence, and recommendation or next step. The final operator-facing synthesis artifact itself MUST expose that evidence basis; do not leave source grounding only in predecessor artifacts, handoff prose, or workflow memory. For the final synthesis, include explicit `Sources consulted` and `Source quality notes` sections, or equally explicit equivalents, that name the source-review artifact and the principal external sources or source families that support the answer. Stage-specific closure for this playbook: `question-framing` stays open until the question and decision context are explicit; `source-review` stays open until the available evidence has been compared and bounded; `synthesis` stays open until the final output is internally consistent, visibly source-grounded, and honest about uncertainty. Guided closure rule: follow the preferred stage order when useful, but prioritize an honest bounded answer over false precision.
  parameters:
    - slug: research_question
      title: Research Question
      required: true
    - slug: decision_context
      title: Decision Context
      required: false
    - slug: source_scope
      title: Source Scope
      required: false
  roles:
    - Research Analyst
  stages:
    - name: question-framing
      goal: The exact research question and decision context are explicit.
      involves:
        - Research Analyst
    - name: source-review
      goal: Evidence has been gathered and compared.
      involves:
        - Research Analyst
    - name: synthesis
      goal: Findings, confidence, and recommendation are documented.
      involves:
        - Research Analyst
  lifecycle: planned
  orchestrator:
    max_rework_iterations: 5
    max_active_tasks: 2
    max_active_tasks_per_work_item: 1
    allow_parallel_work_items: false
