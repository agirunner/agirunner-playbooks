id: deep-research-pipeline
version: 1.0.5
name: Deep Research Pipeline
author: agirunner
slug: deep-research-pipeline
category: research
stability: experimental
description: Run multi-pass research from brief to reviewed synthesis with explicit evidence and contradiction handling.
outcome: A reviewed research synthesis exists with evidence, contradictions, confidence, and an operator-usable recommendation.
lifecycle: planned
tags:
  - research
  - synthesis
  - deep-research
specialist_ids:
  - research-analyst
  - research-reviewer
definition:
  outcome: A reviewed research synthesis exists with evidence, contradictions, confidence, and an operator-usable recommendation.
  process_instructions: |
    Run the workflow through the authored stages `brief-framing`, `evidence-gathering`, `synthesis-draft`, and `review`. Treat each stage as a distinct checkpoint of research depth and trustworthiness: `brief-framing` exists to define the exact brief, scope, and decision context; `evidence-gathering` exists to collect and compare the strongest available sources over multiple passes; `synthesis-draft` exists to turn that evidence into a bounded synthesis; `review` exists to check the synthesis for unsupported claims, missing contradictions, and overclaim risk before closure.

    Use these roles deliberately: `Research Analyst` owns the brief framing, source work, and synthesis draft; `Research Reviewer` verifies that the draft is supported by the recorded evidence and does not overstate confidence.

    Preferred flow: start with the earliest unfinished stage, require a crisp brief and scope before broad source collection, and let `Research Analyst` make more than one evidence pass when the question is complex or contradictory. Treat explicit source-scope or research-path instructions from the brief and launch inputs as binding. When those instructions call for external research or quoted `native web search` and the current task and selected model expose `native_search`, the specialist must call `native_search` before relying only on local artifacts or model knowledge unless the task records a concrete reason that path is unavailable, disabled, or clearly irrelevant. Tool enumeration alone does not satisfy that rule; when this path is required and available, the specialist must actually use quoted `native web search` before handoff and reflect what it returned or why it could not be used. Use `tool_search` to confirm the current task's exposed tool list before describing tool availability. That current-task tool list is canonical: source-scope notes, framing artifacts, and predecessor handoffs must not mark quoted `native web search` as unavailable when `native_search` is present, and later stages must ignore stale contrary notes and follow the current task contract. When the current task and selected model expose the `native_search` tool for quoted `native web search`, the first open-web research step after checking the available tools must be `native_search` so the specialist discovers candidate sources before choosing what to inspect. Use `web_fetch` or other narrower source-access paths only after `native_search` surfaces promising sources, or after the specialist establishes that `native_search` is unavailable or insufficient. Do not begin open-web discovery with repeated `web_fetch` probing while `native_search` is available. Route the synthesis to `Research Reviewer` only after the draft records its evidence base, contradictions, confidence, and recommendation explicitly.

    Recovery and exception handling: if the brief is underspecified, if the source base is weak or stale, if contradictions materially change the answer, if the draft overreaches what the evidence supports, or if available research tooling cannot surface the needed evidence, keep the current stage open until the limitation is explicit. Do not treat “lots of reading” as proof of depth. If the strongest honest answer is a bounded synthesis with major open questions, record that instead of forcing a definitive conclusion.

    Completion rules: finish only after the reviewed synthesis records the brief, sources consulted, source quality notes, key findings, contradictions or gaps, confidence, recommendation, and review disposition. Stage-specific closure for this playbook: `brief-framing` stays open until the question and decision context are explicit; `evidence-gathering` stays open until the source base is gathered and bounded; `synthesis-draft` stays open until the draft is internally coherent and source-aware; `review` stays open until blocking evidence issues are resolved or clearly called out. Guided closure rule: prefer a bounded and honestly reviewed synthesis over a polished but overclaimed deep-research artifact.
  parameters:
    - slug: research_brief
      title: Research Brief
      required: true
    - slug: decision_goal
      title: Decision Goal
      required: false
    - slug: source_constraints
      title: Source Constraints
      required: false
  roles:
    - Research Analyst
    - Research Reviewer
  stages:
    - name: brief-framing
      goal: The research brief and decision context are explicit.
      involves:
        - Research Analyst
    - name: evidence-gathering
      goal: Evidence has been gathered and compared over the needed passes.
      involves:
        - Research Analyst
    - name: synthesis-draft
      goal: A source-aware synthesis draft is documented.
      involves:
        - Research Analyst
    - name: review
      goal: The synthesis has been reviewed for evidence support and overclaim risk.
      involves:
        - Research Reviewer
  lifecycle: planned
  orchestrator:
    max_rework_iterations: 5
    max_active_tasks: 2
    max_active_tasks_per_work_item: 1
    allow_parallel_work_items: false
