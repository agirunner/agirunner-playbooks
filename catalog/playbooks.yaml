playbooks:
  - id: bug-fix
    name: Bug Fix
    author: agirunner
    category: engineering
    stability: experimental
    version: 1.0.1
    summary: Diagnose and fix a bounded defect with review, security review, QA verification, and human release approval.
    specialist_ids:
      - developer
      - reviewer
      - security-reviewer
      - qa-reviewer
    path: playbooks/engineering/bug-fix/playbook.yaml
  - id: hotfix
    name: Hotfix
    author: agirunner
    category: engineering
    stability: experimental
    version: 1.0.1
    summary: Execute an urgent defect fix with explicit risk tradeoffs and human release approval.
    specialist_ids:
      - developer
      - reviewer
      - security-reviewer
      - qa-reviewer
    path: playbooks/engineering/hotfix/playbook.yaml
  - id: pr-guardian
    name: PR Guardian
    author: agirunner
    category: engineering
    stability: experimental
    version: 1.0.1
    summary: Guard a proposed change against merge risk with review, security, and regression scrutiny.
    specialist_ids:
      - reviewer
      - security-reviewer
      - qa-reviewer
    path: playbooks/engineering/pr-guardian/playbook.yaml
  - id: customer-support-triage
    name: Customer Support Triage
    author: agirunner
    category: operations
    stability: stable
    version: 1.0.1
    summary: Classify, prioritize, and route an inbound support request with a clear next action.
    specialist_ids:
      - support-triage-analyst
    path: playbooks/operations/customer-support-triage/playbook.yaml
  - id: sop-creation
    name: SOP Creation
    author: agirunner
    category: operations
    stability: stable
    version: 1.0.1
    summary: Draft a standard operating procedure with scope, owners, steps, and exception handling.
    specialist_ids:
      - process-designer
      - content-editor
    path: playbooks/operations/sop-creation/playbook.yaml
  - id: runbook-creation
    name: Runbook Creation
    author: agirunner
    category: operations
    stability: stable
    version: 1.0.1
    summary: Draft a safe operational runbook with prerequisites, rollback, and validation steps.
    specialist_ids:
      - process-designer
      - content-editor
    path: playbooks/operations/runbook-creation/playbook.yaml
  - id: research-analysis
    name: Research Analysis
    author: agirunner
    category: research
    stability: stable
    version: 1.0.2
    summary: Produce a grounded research synthesis with explicit evidence, contradictions, and confidence.
    specialist_ids:
      - research-analyst
    path: playbooks/research/research-analysis/playbook.yaml
  - id: vendor-evaluation
    name: Vendor Evaluation
    author: agirunner
    category: research
    stability: stable
    version: 1.0.2
    summary: Compare vendors against explicit requirements, risks, and decision criteria.
    specialist_ids:
      - vendor-analyst
      - business-case-analyst
    path: playbooks/research/vendor-evaluation/playbook.yaml
  - id: business-case
    name: Business Case
    author: agirunner
    category: research
    stability: stable
    version: 1.0.2
    summary: Structure a decision-ready business case with options, tradeoffs, and recommendation logic.
    specialist_ids:
      - research-analyst
      - business-case-analyst
    path: playbooks/research/business-case/playbook.yaml
  - id: policy-review
    name: Policy Review
    author: agirunner
    category: compliance
    stability: stable
    version: 1.0.1
    summary: Review policy text for obligations, ambiguity, conflicts, and process impact.
    specialist_ids:
      - policy-analyst
    path: playbooks/compliance/policy-review/playbook.yaml
  - id: contract-review
    name: Contract Review
    author: agirunner
    category: compliance
    stability: stable
    version: 1.0.1
    summary: Review a contract for obligations, deadlines, risk concentration, and follow-up items.
    specialist_ids:
      - contract-analyst
    path: playbooks/compliance/contract-review/playbook.yaml
  - id: technical-documentation
    name: Technical Documentation
    author: agirunner
    category: content
    stability: stable
    version: 1.0.1
    summary: Draft or revise task-oriented technical documentation with editorial review.
    specialist_ids:
      - technical-writer
      - content-editor
    path: playbooks/content/technical-documentation/playbook.yaml
  - id: api-documentation
    name: API Documentation
    author: agirunner
    category: content
    stability: stable
    version: 1.0.1
    summary: Draft or revise API reference material with editorial review and contract caveats.
    specialist_ids:
      - api-docs-writer
      - content-editor
    path: playbooks/content/api-documentation/playbook.yaml
