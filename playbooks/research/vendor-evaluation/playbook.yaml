id: vendor-evaluation
version: 1.0.7
name: Vendor Evaluation
author: agirunner
slug: vendor-evaluation
category: research
stability: experimental
description: Compare vendors against explicit requirements, risks, and decision criteria.
outcome: A vendor comparison exists with criteria, risks, unknowns, and a recommendation or shortlist.
lifecycle: planned
tags:
  - research
  - procurement
  - evaluation
specialist_ids:
  - vendor-analyst
  - business-case-analyst
definition:
  outcome: A vendor comparison exists with criteria, risks, unknowns, and a recommendation or shortlist.
  process_instructions: |
    Run the workflow through the authored stages `requirements-framing`, `vendor-comparison`, and `recommendation`. Treat each stage as a distinct checkpoint of decision quality: `requirements-framing` exists to define what matters in the buying decision; `vendor-comparison` exists to compare the available options against those criteria; `recommendation` exists to turn the comparison into a shortlist or recommended option with clear tradeoffs.

    Use these roles deliberately: `Vendor Analyst` compares the candidate vendors against the stated criteria; `Business Case Analyst` converts that comparison into a decision-ready recommendation.

    Preferred flow: start with the earliest unfinished stage, require the requirements, constraints, and must-have criteria to be explicit before ranking vendors, use an explicit comparison framework when the criteria set is large, and route the comparison to `Business Case Analyst` only after the tradeoff picture is clear enough to support a recommendation. Treat explicit source-scope or research-path instructions from the brief and launch inputs as binding. When those instructions call for external research or quoted `native web search` and the current task and selected model expose `native_search`, the specialist must call `native_search` before relying only on local artifacts or model knowledge unless the task records a concrete reason that path is unavailable, disabled, or clearly irrelevant. Tool enumeration alone does not satisfy that rule; when this path is required and available, the specialist must actually use quoted `native web search` before handoff and reflect what it returned or why it could not be used. Use `tool_search` to confirm the current task's exposed tool list before describing tool availability. That current-task tool list is canonical: source-scope notes, framing artifacts, and predecessor handoffs must not mark quoted `native web search` as unavailable when `native_search` is present, and later stages must ignore stale contrary notes and follow the current task contract. When the current task and selected model expose the `native_search` tool for quoted `native web search`, the first open-web research step after checking the available tools must be `native_search` so the specialist discovers candidate sources before choosing what to inspect. Use `web_fetch` or other narrower source-access paths only after `native_search` surfaces promising sources, or after the specialist establishes that `native_search` is unavailable or insufficient. Do not begin open-web discovery with repeated `web_fetch` probing while `native_search` is available. Separate confirmed capability from vendor claim or assumption throughout the comparison.

    Recovery and exception handling: if must-have requirements are missing, if marketing claims are treated as proof, if implementation assumptions materially affect the outcome, or if decision-critical unknowns remain unresolved, keep the current stage open and require the handoff to name those gaps directly. Do not fabricate ranking precision that the evidence cannot support. If the quoted `native web search` tool is not exposed by the current task or selected model, is disabled for the task, or does not surface the needed evidence, use the best available sources and record that limitation. If the strongest honest answer is “shortlist only,” record that instead of overstating certainty.

    Completion rules: finish only after the final output records the decision scope, evaluation criteria, vendor comparison, material risks, unknowns, implementation assumptions that affect the ranking, and recommendation or shortlist. Stage-specific closure for this playbook: `requirements-framing` stays open until criteria and constraints are explicit; `vendor-comparison` stays open until the options are compared against those criteria with claim-vs-confirmation boundaries clear; `recommendation` stays open until the decision guidance is backed by the recorded evidence. Guided closure rule: prefer a well-bounded shortlist with explicit unknowns over a forced single-winner conclusion.
  parameters:
    - slug: decision_scope
      title: Decision Scope
      required: true
    - slug: evaluation_criteria
      title: Evaluation Criteria
      required: true
    - slug: candidate_vendors
      title: Candidate Vendors
      required: true
  roles:
    - Vendor Analyst
    - Business Case Analyst
  stages:
    - name: requirements-framing
      goal: The decision scope, criteria, and constraints are explicit.
      involves:
        - Business Case Analyst
    - name: vendor-comparison
      goal: Candidate vendors are compared against the stated criteria.
      involves:
        - Vendor Analyst
    - name: recommendation
      goal: A recommendation or shortlist is documented with tradeoffs.
      involves:
        - Business Case Analyst
  lifecycle: planned
  orchestrator:
    max_rework_iterations: 5
    max_active_tasks: 2
    max_active_tasks_per_work_item: 1
    allow_parallel_work_items: false
