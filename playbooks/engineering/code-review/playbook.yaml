id: code-review
version: 1.0.0
name: Code Review
slug: code-review
category: engineering
stability: experimental
description: Review a proposed change for correctness, security, and verification quality before disposition.
outcome: A proposed change has a clear review disposition with blocking findings, non-blocking callouts, and verification notes.
lifecycle: planned
tags:
  - engineering
  - review
  - sdlc
specialist_ids:
  - reviewer
  - security-reviewer
  - qa-reviewer
definition:
  outcome: A proposed change has a clear review disposition with blocking findings, non-blocking callouts, and verification notes.
  process_instructions: |
    Run the workflow through the authored stages `review-prep`, `code-review`, `security-review`, and `disposition`. Treat each stage as a distinct checkpoint of review quality: `review-prep` exists to define what change is being reviewed and what evidence is available; `code-review` exists to assess correctness and maintainability; `security-review` exists to assess security exposure; `disposition` exists to consolidate the findings into a usable outcome.

    Use these roles deliberately: `Code Reviewer` performs the primary review; `Security Reviewer` reviews the security surfaces; `QA Reviewer` checks whether the available verification evidence is strong enough to trust the change.

    Preferred flow: start with the earliest unfinished stage, define the review scope explicitly, then route the change through `Code Reviewer`, `Security Reviewer`, and `QA Reviewer` before final disposition. This playbook is storage-agnostic and can complete from artifacts alone because it is a review workflow rather than an implementation workflow.

    Recovery and exception handling: if the change scope is unclear, if evidence is missing, or if one reviewer finds a blocker that materially changes the disposition, keep the current subject open until the blocking issue and required follow-up are explicit. When reviewer verdicts disagree, preserve each verdict separately and use the most conservative still-supported disposition instead of averaging the disagreement away. Do not merge blocking and non-blocking findings into one vague verdict, and do not approve based on style polish when verification is weak.

    Completion rules: finish only after the final disposition records review scope, blocking findings, non-blocking callouts, open questions or assumptions, verification gaps, security findings, and the resulting recommendation. Stage-specific closure for this playbook: `review-prep` stays open until the review scope and available evidence are explicit; `code-review` stays open until the primary review verdict is clear; `security-review` stays open until security findings or non-applicability are recorded; `disposition` stays open until the combined recommendation is internally consistent and does not hide unresolved assumptions. Guided closure rule: prefer an honest request-for-changes outcome over a soft approval that hides real uncertainty.
  parameters:
    - slug: review_scope
      title: Review Scope
      required: true
    - slug: change_goal
      title: Change Goal
      required: true
    - slug: available_evidence
      title: Available Evidence
      required: false
  roles:
    - Code Reviewer
    - Security Reviewer
    - QA Reviewer
  board:
    entry_column_id: planned
    columns:
      - id: planned
        label: Planned
        description: Work is defined but not yet assigned.
      - id: active
        label: In Progress
        description: A specialist is actively working.
      - id: blocked
        label: Blocked
        description: Work is blocked and needs intervention.
        is_blocked: true
      - id: done
        label: Done
        description: The work item meets its acceptance criteria.
        is_terminal: true
  stages:
    - name: review-prep
      goal: Review scope and available evidence are explicit.
      involves:
        - Code Reviewer
    - name: code-review
      goal: Primary review findings and verdict are documented.
      involves:
        - Code Reviewer
    - name: security-review
      goal: Security findings or non-applicability are documented.
      involves:
        - Security Reviewer
    - name: disposition
      goal: Verification quality and overall recommendation are recorded.
      involves:
        - QA Reviewer
  lifecycle: planned
  orchestrator:
    max_rework_iterations: 3
    max_active_tasks: 3
    max_active_tasks_per_work_item: 1
    allow_parallel_work_items: false
