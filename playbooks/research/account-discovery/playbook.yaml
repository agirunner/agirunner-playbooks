id: account-discovery
version: 1.0.5
name: Account Discovery
author: agirunner
slug: account-discovery
category: research
stability: experimental
description: Build an account qualification packet with fit, urgency, risk, and next-step guidance.
outcome: An account discovery packet exists with summary, qualification signals, risks, and the recommended next step.
lifecycle: planned
tags:
  - research
  - discovery
  - account
specialist_ids:
  - lead-research-analyst
definition:
  outcome: An account discovery packet exists with summary, qualification signals, risks, and the recommended next step.
  process_instructions: |
    Run the workflow through the authored stages `account-framing`, `signal-gathering`, and `qualification-packet`. Treat each stage as a distinct checkpoint of account qualification quality: `account-framing` exists to define the account, target outcome, and fit criteria; `signal-gathering` exists to gather the strongest available evidence about fit, urgency, and blockers; `qualification-packet` exists to convert that evidence into an operator-usable account packet.

    Use these roles deliberately: `Account Discovery Analyst` owns the account framing, evidence gathering, qualification logic, and final packet.

    Preferred flow: start with the earliest unfinished stage, require the named account and the qualification goal to be explicit before interpreting signals, and prefer direct company, product, funding, hiring, or customer evidence over generic firmographics. Treat explicit source-scope or research-path instructions from the brief and launch inputs as binding. When those instructions call for external research or quoted `native web search` and the current task and selected model expose `native_search`, the specialist must call `native_search` before relying only on local artifacts or model knowledge unless the task records a concrete reason that path is unavailable, disabled, or clearly irrelevant. Tool enumeration alone does not satisfy that rule; when this path is required and available, the specialist must actually use quoted `native web search` before handoff and reflect what it returned or why it could not be used. Use `tool_search` to confirm the current task's exposed tool list before describing tool availability. That current-task tool list is canonical: source-scope notes, framing artifacts, and predecessor handoffs must not mark quoted `native web search` as unavailable when `native_search` is present, and later stages must ignore stale contrary notes and follow the current task contract. When the current task and selected model expose the `native_search` tool for quoted `native web search`, the first open-web discovery step after checking the available tools must be `native_search` so the specialist discovers candidate sources before choosing what to inspect. Use `web_fetch` or other narrower source paths only after `native_search` surfaces promising sources, or after the specialist establishes that `native_search` is unavailable or insufficient. Do not begin open-web discovery with repeated `web_fetch` probing while `native_search` is available. Keep fit, urgency, and risk as separate lenses in the final packet.

    Recovery and exception handling: if the account identity is ambiguous, if the qualification goal is unclear, if the evidence is too weak to support a strong recommendation, or if external search tooling does not surface the needed evidence, keep the current stage open until the limitation is explicit. Do not force a positive qualification when the stronger answer is defer, disqualify, or gather more data. If the best honest output is a bounded profile with open questions, record that directly.

    Completion rules: finish only after the final packet records the account summary, fit signals, urgency signals, risks or gaps, qualification level, and the recommended next step. Stage-specific closure for this playbook: `account-framing` stays open until the account and qualification goal are explicit; `signal-gathering` stays open until the available evidence is compared and bounded; `qualification-packet` stays open until the final recommendation follows from the recorded signals instead of narrative preference. Guided closure rule: prefer a cautious qualification packet with explicit open questions over a confident but weakly supported recommendation.
  parameters:
    - slug: account_name
      title: Account Name
      required: true
    - slug: qualification_goal
      title: Qualification Goal
      required: false
    - slug: search_constraints
      title: Search Constraints
      required: false
  roles:
    - Account Discovery Analyst
  stages:
    - name: account-framing
      goal: The account target and qualification goal are explicit.
      involves:
        - Account Discovery Analyst
    - name: signal-gathering
      goal: Account signals are gathered and compared.
      involves:
        - Account Discovery Analyst
    - name: qualification-packet
      goal: A qualification packet is documented.
      involves:
        - Account Discovery Analyst
  lifecycle: planned
  orchestrator:
    max_rework_iterations: 5
    max_active_tasks: 2
    max_active_tasks_per_work_item: 1
    allow_parallel_work_items: false
