id: business-case
version: 1.0.7
name: Business Case
author: agirunner
slug: business-case
category: research
stability: experimental
description: Structure a decision-ready business case with options, tradeoffs, and recommendation logic.
outcome: A business case exists with decision framing, options, evidence, assumptions, and a recommendation.
lifecycle: planned
tags:
  - research
  - strategy
  - decision-support
specialist_ids:
  - research-analyst
  - business-case-analyst
definition:
  outcome: A business case exists with decision framing, options, evidence, assumptions, and a recommendation.
  process_instructions: |
    Run the workflow through the authored stages `decision-framing`, `evidence-collection`, and `recommendation`. Treat each stage as a distinct checkpoint of decision readiness: `decision-framing` exists to define the actual decision and options in scope; `evidence-collection` exists to gather the facts and constraints that matter; `recommendation` exists to structure the tradeoffs into a decision-ready business case.

    Use these roles deliberately: `Business Case Analyst` frames the decision and produces the final business case; `Research Analyst` gathers or synthesizes the supporting evidence needed for the comparison.

    Preferred flow: start with the earliest unfinished stage, require a clear decision framing, explicit evaluation criteria, and the status quo option before collecting evidence, then use `Research Analyst` to gather the supporting facts and route the result back to `Business Case Analyst` for the final recommendation. Treat explicit source-scope or research-path instructions from the brief and launch inputs as binding. When those instructions call for external research or quoted `native web search` and the current task and selected model expose `native_search`, the specialist must call `native_search` before relying only on local artifacts or model knowledge unless the task records a concrete reason that path is unavailable, disabled, or clearly irrelevant. Tool enumeration alone does not satisfy that rule; when this path is required and available, the specialist must actually use quoted `native web search` before handoff and reflect what it returned or why it could not be used. Use `tool_search` to confirm the current task's exposed tool list before describing tool availability. That current-task tool list is canonical: source-scope notes, framing artifacts, and predecessor handoffs must not mark quoted `native web search` as unavailable when `native_search` is present, and later stages must ignore stale contrary notes and follow the current task contract. When the current task and selected model expose the `native_search` tool for quoted `native web search`, the first open-web research step after checking the available tools must be `native_search` so the specialist discovers candidate sources before choosing what to inspect. Use `web_fetch` or other narrower source-access paths only after `native_search` surfaces promising sources, or after the specialist establishes that `native_search` is unavailable or insufficient. Do not begin open-web discovery with repeated `web_fetch` probing while `native_search` is available. Lack of a writable workspace is not blocking for this playbook because the final product is the business case itself.

    Recovery and exception handling: if the options are undefined, if the evaluation criteria drift, if evidence is too weak to support a recommendation, or if assumptions are being presented as facts, keep the current stage open and require the handoff to label those issues explicitly. Do not manufacture certainty or quantified precision where the evidence is only directional. If the quoted `native web search` tool is not exposed by the current task or selected model, is disabled for the task, or does not surface the needed evidence, use the best available sources and record that limitation.

    Completion rules: finish only after the final business case records the decision, options, criteria, evidence and assumptions, decision-critical unknowns, recommendation, and confidence. Stage-specific closure for this playbook: `decision-framing` stays open until the decision, options, and criteria are explicit; `evidence-collection` stays open until the supporting evidence is assembled and bounded; `recommendation` stays open until the final recommendation follows from the recorded evidence instead of narrative preference. Guided closure rule: prefer a cautious recommendation with explicit assumptions over a polished but unsupported answer.
  parameters:
    - slug: decision_question
      title: Decision Question
      required: true
    - slug: options_in_scope
      title: Options In Scope
      required: true
    - slug: success_criteria
      title: Success Criteria
      required: true
  roles:
    - Research Analyst
    - Business Case Analyst
  stages:
    - name: decision-framing
      goal: The decision, options, and criteria are explicit.
      involves:
        - Business Case Analyst
    - name: evidence-collection
      goal: Supporting evidence and constraints are assembled.
      involves:
        - Research Analyst
    - name: recommendation
      goal: A decision-ready business case is documented.
      involves:
        - Business Case Analyst
  lifecycle: planned
  orchestrator:
    max_rework_iterations: 5
    max_active_tasks: 2
    max_active_tasks_per_work_item: 1
    allow_parallel_work_items: false
